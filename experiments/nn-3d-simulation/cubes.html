<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>مختبر المكعبات العصبية</title>
  <link rel="stylesheet" href="./src/cubes.css">
</head>
<body>
  <main id="app">
    <canvas id="scene"></canvas>

    <section id="topGuide" aria-label="دليل النموذج">
      <span><i class="input"></i> INPUT 28x28 = 784</span>
      <span><i class="hidden"></i> HIDDEN 96 + 48</span>
      <span><i class="output"></i> OUTPUT 0-9</span>
      <span><i class="weights"></i> W = 80,352</span>
    </section>

    <section id="hud" aria-label="لوحة الحسابات">
      <h1>مختبر المكعبات العصبية</h1>
      <p>تمثيل 3D حقيقي لبنية MLP: كل مكعب عصبون أو بكسل، وكل خط وزن مدرب.</p>
      <div class="stats">
        <div><span>Architecture</span><b id="stArch">-</b></div>
        <div><span>Weights shown</span><b id="stShown">-</b></div>
        <div><span>Total weights</span><b id="stWeights">-</b></div>
        <div><span>Parameters</span><b id="stParams">-</b></div>
        <div><span>Learning</span><b id="stLearning">-</b></div>
        <div><span>Sample</span><b id="stSample">-</b></div>
      </div>
      <p id="mathNote" class="mathNote">-</p>
    </section>

    <section id="samplePanel" aria-label="العينة الحالية">
      <canvas id="digit" width="160" height="160"></canvas>
      <div class="sampleMeta">
        <div>الحقيقة <b id="trueLabel">-</b></div>
        <div>التوقع <b id="predLabel">-</b></div>
        <div>الخسارة <b id="lossVal">-</b></div>
      </div>
      <div id="bars"></div>
      <div class="controls">
        <button id="prevSample" type="button">السابق</button>
        <button id="nextSample" type="button">عينة جديدة</button>
        <button id="toggleOrbit" type="button">إيقاف الدوران</button>
        <button id="toggleLines" type="button">وصلات أكثر</button>
      </div>
    </section>

    <div id="loading">جاري تحميل النموذج الحقيقي...</div>
  </main>
  <script type="module" src="./src/cubes.js?v=mnist-flow-pulses"></script>
</body>
</html>
